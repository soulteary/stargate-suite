# Per-key: comment (for .env and compose), services (which compose service may use this env), default (optional)
vars:
  HERALD_IMAGE: { comment: "Herald Service Image", services: [], default: "ghcr.io/soulteary/herald:v0.9.0" }
  WARDEN_IMAGE: { comment: "Warden Service Image", services: [], default: "ghcr.io/soulteary/warden:v0.13.0" }
  STARGATE_IMAGE: { comment: "Stargate Service Image", services: [], default: "ghcr.io/soulteary/stargate:v0.11.0" }
  HERALD_REDIS_IMAGE: { comment: "Herald Redis Image", services: [], default: "redis:8.4-alpine" }
  WARDEN_REDIS_IMAGE: { comment: "Warden Redis Image", services: [], default: "redis:8.4-alpine" }
  STARGATE_REDIS_IMAGE: { comment: "Stargate Redis Image", services: [], default: "redis:8.4-alpine" }
  PROTECTED_IMAGE: { comment: "Protected service (whoami) image", services: [], default: "ghcr.io/traefik/whoami:v1.11" }
  PORT: { comment: "服务监听端口", services: [stargate] }
  REDIS_ADDR: { comment: "Herald Redis 地址 (host:port)，可通过 HERALD_REDIS_ADDR 覆盖", services: [herald] }
  REDIS_PASSWORD: { comment: "Redis 密码，留空表示无认证", services: [herald] }
  REDIS_DB: { comment: "Herald Redis 库号", services: [herald] }
  LOG_LEVEL: { comment: "日志级别 (info/debug/warn/error)", services: [herald, herald-totp, herald-dingtalk, herald-smtp, warden] }
  HERALD_REDIS_ADDR: { comment: "Herald Redis 地址", services: [herald], default: "herald-redis:6379" }
  HERALD_REDIS_PASSWORD: { comment: "Herald Redis 密码", services: [herald], default: "" }
  HERALD_REDIS_DB: { comment: "Herald Redis 库号", services: [herald], default: "0" }
  WARDEN_REDIS_ADDR: { comment: "Warden Redis 地址", services: [warden], default: "warden-redis:6379" }
  WARDEN_REDIS_PASSWORD: { comment: "Warden Redis 密码", services: [warden], default: "" }
  WARDEN_REDIS_PASSWORD_FILE: { comment: "Warden Redis 密码文件路径", services: [warden] }
  WARDEN_REDIS_ENABLED: { comment: "Warden 是否启用 Redis", services: [warden], default: "true" }
  WARDEN_DATA_FILE: { comment: "Warden 本地用户数据文件路径", services: [warden] }
  HERALD_REDIS_DATA_PATH: { comment: "Herald Redis 数据目录（绑定路径时）", services: [], default: "./data/herald-redis" }
  WARDEN_REDIS_DATA_PATH: { comment: "Warden Redis 数据目录（绑定路径时）", services: [], default: "./data/warden-redis" }
  API_KEY: { comment: "服务间 API 密钥，生产请修改", services: [] }
  HMAC_SECRET: { comment: "Herald HMAC 签名密钥，生产请修改", services: [] }
  HERALD_API_KEY: { comment: "Herald API 密钥", services: [herald, stargate] }
  HERALD_HMAC_SECRET: { comment: "Herald HMAC 密钥", services: [herald, stargate] }
  HERALD_TEST_MODE: { comment: "Herald 测试模式（免真实发送验证码）", services: [herald] }
  PROVIDER_FAILURE_POLICY: { comment: "Provider 失败策略 (soft/strict)", services: [herald] }
  CHALLENGE_EXPIRY: { comment: "验证码有效期", services: [herald] }
  CODE_LENGTH: { comment: "验证码长度", services: [herald] }
  MAX_ATTEMPTS: { comment: "单 challenge 最大验证次数", services: [herald] }
  RESEND_COOLDOWN: { comment: "重发冷却时间", services: [herald] }
  IDEMPOTENCY_KEY_TTL: { comment: "Herald 幂等键 TTL（0 表示使用 CHALLENGE_EXPIRY）", services: [herald] }
  ALLOWED_PURPOSES: { comment: "Herald 允许的 purpose 列表", services: [herald], default: "login" }
  SERVICE_NAME: { comment: "Herald 服务标识（HMAC 等）", services: [herald], default: "herald" }
  HERALD_HMAC_KEYS: { comment: "Herald 多密钥 HMAC JSON", services: [herald] }
  RATE_LIMIT_PER_USER: { comment: "Herald 每用户/小时限流", services: [herald] }
  RATE_LIMIT_PER_IP: { comment: "Herald 每 IP/分钟限流", services: [herald] }
  RATE_LIMIT_PER_DESTINATION: { comment: "Herald 每目标/小时限流", services: [herald] }
